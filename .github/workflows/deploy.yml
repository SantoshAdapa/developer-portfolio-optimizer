name: Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          # Prevent timeout during long Docker builds
          command_timeout: 30m
          timeout: 30m

          script: |
            set -e
            cd ~/developer-portfolio-optimizer

            echo "📥 Updating repository..."
            git fetch origin
            git reset --hard origin/main
            COMMIT_SHA=$(git rev-parse --short HEAD)

            echo "🧹 Cleaning old Docker resources..."
            sudo docker system prune -f

            echo "🔨 Building Docker images..."
            sudo docker compose build frontend backend

            echo "🏷️ Tagging images for rollback..."
            sudo docker tag dpo-backend:latest dpo-backend:$COMMIT_SHA
            sudo docker tag dpo-frontend:latest dpo-frontend:$COMMIT_SHA

            echo "🚀 Restarting backend..."
            sudo docker compose up -d --no-deps backend

            echo "🚀 Restarting frontend..."
            sudo docker compose up -d --no-deps frontend

            echo "📦 Running containers:"
            sudo docker ps

            echo "⏳ Waiting for services to start..."
            sleep 10

            echo "🔍 Checking backend health..."
            if ! curl -sf http://localhost:8000/health > /dev/null; then
              echo "❌ Backend health check failed — rolling back..."
              sudo docker compose up -d --no-deps --no-build backend
              exit 1
            fi

            echo "🔍 Checking frontend..."
            if ! curl -sf http://localhost:3000 > /dev/null; then
              echo "❌ Frontend check failed — rolling back..."
              sudo docker compose up -d --no-deps --no-build frontend
              exit 1
            fi

            echo "✅ Deployment successful (commit: $COMMIT_SHA)"