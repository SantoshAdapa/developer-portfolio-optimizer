name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          # Prevent timeout during long Docker builds
          command_timeout: 30m
          timeout: 30m

          script: |
            set -e
            cd ~/developer-portfolio-optimizer

            echo "📥 Updating repository..."
            git fetch origin
            git reset --hard origin/main

            echo "🧹 Cleaning old Docker resources..."
            sudo docker system prune -f

            echo "🔨 Building Docker images..."
            sudo docker compose build frontend backend

            echo "🚀 Restarting backend..."
            sudo docker compose up -d --no-deps backend

            echo "🚀 Restarting frontend..."
            sudo docker compose up -d --no-deps frontend

            echo "📦 Running containers:"
            sudo docker ps

            echo "⏳ Waiting for services to start..."
            sleep 10

            echo "🔍 Checking backend health..."
            curl -sf http://localhost:8000/health > /dev/null

            echo "🔍 Checking frontend..."
            curl -sf http://localhost:3000 > /dev/null

            echo "✅ Deployment successful"